apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-svc
  namespace: redactd
  labels:
    app: platform-svc
spec:
  replicas: 1
  template:
    metadata:
      name: platform-svc
      labels:
        app: platform-svc
    spec:
      containers:
        - name: platform-svc
          image: saadhtiwana/platform-svc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
      restartPolicy: Always
  selector:
    matchLabels:
      app: platform-svc